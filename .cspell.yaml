version: "0.2"
language: en
caseSensitive: false
allowCompoundWords: false
useGitignore: true
ignorePaths:
  - "**/{cspell.*,cSpell.*,.cspell.*,cspell.config.*}"
  - "**/node_modules/**"
  - "**/build/**"
  - "**/dist/**"
  - "**/.vscode/**"
  - pnpm-lock.yaml
  - package-lock.json
  - "*.svg"
words:
  - frontmatter
  - jing
  - kebabcase
  - pagefind
  - tocbot
  - zite
